<svg class="app-icon-weazel" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="weazelBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>

    <filter id="micShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#450a0a" flood-opacity="0.6" />
    </filter>

    <filter id="waveGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#weazelBg)" />

  <g class="news-globe" stroke="#ffffff" stroke-width="4" stroke-opacity="0.12" fill="none">
    <circle cx="256" cy="256" r="160" />
    <ellipse cx="256" cy="256" rx="160" ry="60" />
    <ellipse cx="256" cy="256" rx="160" ry="120" />
    <ellipse cx="256" cy="256" rx="60" ry="160" />
    <ellipse cx="256" cy="256" rx="120" ry="160" />
  </g>

  <g transform="translate(256, 256) scale(1.15) translate(-256, -256)">
    
    <g class="mic-body" filter="url(#micShadow)">
      
      <path d="M 236 290 V 390 A 20 20 0 0 0 276 390 V 290 Z" fill="#cbd5e1" />
      <rect x="230" y="386" width="52" height="12" rx="4" fill="#94a3b8" />

      <rect x="216" y="100" width="80" height="120" rx="40" fill="#f8fafc" />
      <g stroke="#cbd5e1" stroke-width="6" stroke-linecap="round">
        <path d="M 222 135 H 290 M 216 160 H 296 M 222 185 H 290" />
        <path d="M 238 106 V 214 M 256 100 V 220 M 274 106 V 214" />
      </g>
      
      <rect x="196" y="220" width="120" height="76" rx="8" fill="#ffffff" />
      
      <path d="M 218 240 L 235 276 L 256 250 L 277 276 L 294 240" fill="none" stroke="#dc2626" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" />
    </g>

    <g class="broadcast-waves" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" filter="url(#waveGlow)">
      <path class="wave-inner-l" d="M 176 130 Q 150 160 176 190" />
      <path class="wave-outer-l" d="M 142 104 Q 100 160 142 216" />
      <path class="wave-inner-r" d="M 336 130 Q 362 160 336 190" />
      <path class="wave-outer-r" d="M 370 104 Q 412 160 370 216" />
    </g>

  </g>
</svg>