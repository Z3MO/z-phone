<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="darkBlueBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141E30" /> <stop offset="100%" stop-color="#243B55" /> </linearGradient>

    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#darkBlueBg)" />

  <g fill="#00E5FF" opacity="0.4">
    <circle cx="100" cy="110" r="5" />
    <circle cx="420" cy="140" r="7" />
    <circle cx="80" cy="390" r="6" />
    <circle cx="400" cy="400" r="4" opacity="0.5" />
  </g>

  <g filter="url(#softShadow)">
    <path d="M 256 390 C 256 390 120 270 120 180 C 120 110 210 110 256 160 C 302 110 392 110 392 180 C 392 270 256 390 256 390 Z"
          fill="#FFFFFF" fill-opacity="0.1"
          stroke="#FFFFFF" stroke-width="24" stroke-linejoin="round" stroke-opacity="0.25" />
  </g>

  <g filter="url(#cyanGlow)">
    
    <path d="M 70 260 L 140 260 C 160 260 165 170 185 170 C 205 170 215 360 235 360 C 255 360 265 140 285 140 C 305 140 310 260 330 260 L 442 260"
          fill="none" stroke="#00E5FF" stroke-width="22" stroke-linecap="round" />
          
    <circle cx="390" cy="260" r="14" fill="#FFFFFF" />

  </g>

</svg>