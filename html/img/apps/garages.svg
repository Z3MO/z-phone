<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="carbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2D34" /> <stop offset="100%" stop-color="#0B0D10" /> </linearGradient>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="115" fill="url(#carbonGrad)" />
  
  <circle cx="256" cy="256" r="140" fill="#FF5722" opacity="0.15" filter="url(#neonGlow)" />

  <g fill="#FF5722" opacity="0.6">
    <rect x="30" y="270" width="60" height="12" rx="6" />
    <rect x="-10" y="300" width="80" height="12" rx="6" opacity="0.5" />
    <rect x="50" y="220" width="40" height="10" rx="5" opacity="0.8" />
  </g>

  <rect x="96" y="390" width="320" height="8" rx="4" fill="#FF5722" opacity="0.4" filter="url(#neonGlow)" />

  <g filter="url(#softShadow)">
    
    <rect x="66" y="250" width="380" height="64" rx="32" fill="#FFFFFF" />

    <rect x="146" y="190" width="180" height="70" rx="35" fill="#FFFFFF" />

    <rect x="66" y="220" width="50" height="16" rx="8" fill="#FFFFFF" transform="rotate(-20 66 220)" />

    <rect x="160" y="204" width="150" height="42" rx="21" fill="#111317" />
    
    <rect x="236" y="204" width="16" height="42" rx="8" fill="#FFFFFF" />

    <circle cx="156" cy="314" r="46" fill="#111317" />
    <circle cx="156" cy="314" r="32" fill="none" stroke="#FF5722" stroke-width="10" opacity="0.9" filter="url(#neonGlow)" />
    <circle cx="156" cy="314" r="10" fill="#FFFFFF" />

    <circle cx="366" cy="314" r="46" fill="#111317" />
    <circle cx="366" cy="314" r="32" fill="none" stroke="#FF5722" stroke-width="10" opacity="0.9" filter="url(#neonGlow)" />
    <circle cx="366" cy="314" r="10" fill="#FFFFFF" />

    <rect x="410" y="266" width="30" height="12" rx="6" fill="#00E5FF" filter="url(#neonGlow)" />

    <rect x="60" y="256" width="14" height="24" rx="7" fill="#FF0055" filter="url(#neonGlow)" />

    <rect x="190" y="276" width="110" height="6" rx="3" fill="#111317" opacity="0.15" />

  </g>
</svg>