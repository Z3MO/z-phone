<svg class="app-icon-crypto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cryptoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>

    <linearGradient id="cryptoGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="40%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#854d0e" />
    </linearGradient>

    <filter id="cryptoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#000000" flood-opacity="0.7" />
    </filter>

    <filter id="neonGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#cryptoBg)" />

  <g class="blockchain-grid" stroke="#5eead4" stroke-opacity="0.15" stroke-width="3" fill="#5eead4" fill-opacity="0.3">
    <line x1="80" y1="120" x2="200" y2="80" />
    <line x1="200" y1="80" x2="380" y2="140" />
    <line x1="380" y1="140" x2="450" y2="280" />
    <line x1="80" y1="120" x2="140" y2="350" />
    <line x1="140" y1="350" x2="300" y2="440" />
    <line x1="450" y1="280" x2="300" y2="440" />
    <circle cx="80" cy="120" r="6" />
    <circle cx="200" cy="80" r="4" />
    <circle cx="380" cy="140" r="8" />
    <circle cx="450" cy="280" r="5" />
    <circle cx="140" cy="350" r="7" />
    <circle cx="300" cy="440" r="6" />
  </g>

  <g transform="translate(256, 256) scale(1.15) translate(-256, -256)">
    
    <path class="bull-trend" d="M 110 380 L 170 280 L 250 310 L 320 180 L 400 130" fill="none" stroke="#10b981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGreen)" />

    <g class="crypto-coin" filter="url(#cryptoShadow)">
      
      <circle cx="256" cy="256" r="105" fill="url(#cryptoGold)" />
      
      <circle cx="256" cy="256" r="85" fill="#020617" />
      
      <circle cx="256" cy="256" r="76" fill="none" stroke="url(#cryptoGold)" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="8 8" />

      <g stroke="url(#cryptoGold)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M 206 206 H 306 L 206 306 H 306" />
        <line x1="236" y1="176" x2="236" y2="336" stroke-width="12" />
        <line x1="276" y1="176" x2="276" y2="336" stroke-width="12" />
      </g>

    </g>

    <g class="crypto-sparks" fill="#5eead4" opacity="0">
      <circle cx="180" cy="180" r="4" />
      <circle cx="340" cy="320" r="3" />
      <circle cx="350" cy="160" r="5" />
    </g>

  </g>
</svg>