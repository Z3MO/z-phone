      <rect x="126" y="140" width="46" height="36" rx="18" />
      
      <rect x="186" y="130" width="140" height="50" rx="25" />
      
      <rect x="86" y="166" width="340" height="220" rx="50" />
    </g>
    
    <circle cx="256" cy="286" r="42" fill="none" stroke="#FFFFFF" stroke-width="10" />
    
    <circle cx="256" cy="286" r="16" fill="#FFFFFF" />

