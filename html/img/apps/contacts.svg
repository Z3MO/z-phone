<svg class="app-icon-contacts" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="contactBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#0f172a" flood-opacity="0.4" />
    </filter>
    
    <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#047857" flood-opacity="0.6" />
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#contactBg)" />

  <g class="network-nodes" stroke="#ffffff" stroke-opacity="0.15" stroke-width="3" fill="#ffffff" fill-opacity="0.4">
    <line x1="80" y1="120" x2="150" y2="250" />
    <line x1="150" y1="250" x2="90" y2="400" />
    <line x1="420" y1="100" x2="380" y2="240" />
    <line x1="380" y1="240" x2="440" y2="380" />
    <line x1="150" y1="250" x2="380" y2="240" stroke-dasharray="8 8" />
    
    <circle cx="80" cy="120" r="5" />
    <circle cx="150" cy="250" r="8" />
    <circle cx="90" cy="400" r="5" />
    <circle cx="420" cy="100" r="6" />
    <circle cx="380" cy="240" r="8" />
    <circle cx="440" cy="380" r="5" />
  </g>

  <g transform="translate(256, 256) scale(1.15) translate(-256, -256)">
    
    <g class="profile-card" filter="url(#cardShadow)">
      <rect x="146" y="116" width="220" height="280" rx="24" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="4" />
      
      <circle cx="256" cy="186" r="38" fill="#ffffff" />
      <path d="M 186 286 C 186 242, 212 232, 256 232 C 300 232, 326 242, 326 286 Z" fill="#ffffff" />
      
      <g class="contact-lines" stroke="#ffffff" stroke-linecap="round">
        <line x1="186" y1="326" x2="326" y2="326" stroke-width="8" opacity="0.9" />
        <line x1="186" y1="356" x2="286" y2="356" stroke-width="8" opacity="0.5" />
      </g>
    </g>

    <g class="add-badge" filter="url(#badgeShadow)">
      <circle cx="366" cy="116" r="32" fill="#10b981" />
      <g class="plus-sign">
        <path d="M 366 96 V 136 M 346 116 H 386" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
      </g>
    </g>

  </g>
</svg>