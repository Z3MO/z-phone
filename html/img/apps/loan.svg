<svg class="app-icon-loan" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="loanBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>

    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="17" stdDeviation="13" flood-color="#022c22" flood-opacity="0.6" />
    </filter>

    <pattern id="bankGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 20 15 V 25 M 15 20 H 25" stroke="#ffffff" stroke-width="2" stroke-opacity="0.05" stroke-linecap="round"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#loanBg)" />
  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#bankGrid)" />

  <path class="loan-chart" d="M -50 400 Q 100 400 150 300 T 320 280 T 450 160 T 600 140" fill="none" stroke="#34d399" stroke-width="6" stroke-opacity="0.2" stroke-linecap="round" />

  <g transform="translate(256, 256) scale(1.15) translate(-256, -256)">
    
    <g filter="url(#iconShadow)">
      <path d="M 182 126 L 276 126 L 336 186 L 336 366 A 16 16 0 0 1 320 382 L 182 382 A 16 16 0 0 1 166 366 L 166 142 A 16 16 0 0 1 182 126 Z" fill="#ffffff" />
      
      <path d="M 276 126 L 276 170 A 16 16 0 0 0 292 186 L 336 186 Z" fill="#e2e8f0" />

      <line x1="206" y1="226" x2="296" y2="226" stroke="#cbd5e1" stroke-width="12" stroke-linecap="round"/>
      <line x1="206" y1="266" x2="296" y2="266" stroke="#cbd5e1" stroke-width="12" stroke-linecap="round"/>
      <line x1="206" y1="306" x2="256" y2="306" stroke="#cbd5e1" stroke-width="12" stroke-linecap="round"/>

      <path d="M 206 356 Q 220 336 230 360 T 266 346" fill="none" stroke="#10b981" stroke-width="7" stroke-linecap="round" />
    </g>

    <g class="loan-coin" filter="url(#iconShadow)">
      <circle cx="346" cy="336" r="56" fill="#fbbf24" />
      <circle cx="346" cy="336" r="44" fill="none" stroke="#f59e0b" stroke-width="4" />
      
      <circle cx="326" cy="316" r="10" fill="#b45309" />
      <circle cx="366" cy="356" r="10" fill="#b45309" />
      <line x1="366" y1="316" x2="326" y2="356" stroke="#b45309" stroke-width="10" stroke-linecap="round" />
    </g>

    <g class="gold-particles" fill="#fde047" opacity="0">
      <circle cx="330" cy="260" r="5" />
      <circle cx="370" cy="270" r="3" />
      <circle cx="350" cy="250" r="4" />
    </g>

  </g>
</svg>