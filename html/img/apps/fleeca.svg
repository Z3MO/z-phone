<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bankGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" /> <stop offset="100%" stop-color="#064E3B" /> </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" /> <stop offset="100%" stop-color="#D97706" /> </linearGradient>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="115" fill="url(#bankGrad)" />
  
  <circle cx="100" cy="120" r="70" fill="#FDE047" opacity="0.25" filter="url(#neonGlow)" />
  <circle cx="420" cy="380" r="80" fill="#10B981" opacity="0.4" filter="url(#neonGlow)" />

  <g fill="#FFFFFF" opacity="0.2">
    <rect x="60" y="80" width="60" height="14" rx="7" />
    <rect x="130" y="80" width="20" height="14" rx="7" />
    
    <rect x="380" y="430" width="80" height="14" rx="7" />
    <rect x="340" y="430" width="30" height="14" rx="7" />
    
    <rect x="40" y="270" width="30" height="10" rx="5" opacity="0.5" />
    <rect x="450" y="220" width="40" height="10" rx="5" opacity="0.5" />
  </g>

  <g filter="url(#softShadow)">
    <circle cx="120" cy="130" r="45" fill="url(#goldGrad)" />
    <circle cx="120" cy="130" r="30" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.4" />
    <rect x="117" y="112" width="6" height="36" rx="3" fill="#FFFFFF" opacity="0.9" />
    <path d="M 124 118 C 114 113, 110 130, 120 130 C 130 130, 126 147, 116 142" 
          fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  </g>

  <g filter="url(#softShadow)">
    
    <rect x="80" y="140" width="352" height="220" rx="30" fill="#FFFFFF" opacity="0.15" />
    <rect x="80" y="140" width="352" height="220" rx="30" fill="none" stroke="#FFFFFF" stroke-width="12" />

    <text x="96" y="225" font-family="'Arial Black', Impact, sans-serif" font-size="80" font-weight="900" font-style="italic" fill="#FFFFFF" letter-spacing="0" filter="url(#softShadow)">
      FL<tspan fill="#FDE047">EE</tspan>CA
    </text>

    <rect x="105" y="255" width="42" height="30" rx="8" fill="url(#goldGrad)" />
    
    <path d="M 165 260 Q 175 270 165 280" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <path d="M 175 254 Q 190 270 175 286" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <path d="M 185 248 Q 205 270 185 292" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.8" />

    <circle cx="385" cy="270" r="22" fill="url(#goldGrad)" opacity="0.9" />
    <circle cx="360" cy="270" r="22" fill="#10B981" opacity="0.9" />

    <rect x="105" y="310" width="55" height="10" rx="5" fill="#FFFFFF" opacity="0.7" />
    <rect x="175" y="310" width="55" height="10" rx="5" fill="#FFFFFF" opacity="0.7" />
    <rect x="245" y="310" width="55" height="10" rx="5" fill="#FFFFFF" opacity="0.7" />
    <rect x="315" y="310" width="35" height="10" rx="5" fill="#FFFFFF" opacity="0.7" />

    <rect x="105" y="330" width="100" height="8" rx="4" fill="#FFFFFF" opacity="0.4" />
    <rect x="310" y="330" width="40" height="8" rx="4" fill="#FFFFFF" opacity="0.4" />

  </g>

  <g filter="url(#softShadow)">
    <circle cx="400" cy="380" r="65" fill="url(#goldGrad)" />
    <circle cx="400" cy="380" r="45" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.4" />
    <rect x="396" y="348" width="8" height="64" rx="4" fill="#FFFFFF" opacity="0.9" />
    <path d="M 405 360 C 385 350, 380 380, 400 380 C 420 380, 415 410, 395 400" 
          fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  </g>

</svg>