<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sunriseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD200" /> <stop offset="50%" stop-color="#FF7A00" /> <stop offset="100%" stop-color="#FF2A54" /> </linearGradient>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <clipPath id="photoClip">
      <rect x="96" y="146" width="320" height="220" rx="40" />
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#sunriseGrad)" />

  <circle cx="120" cy="120" r="80" fill="#FFD200" opacity="0.35" filter="url(#neonGlow)" />
  <circle cx="400" cy="400" r="90" fill="#FF2A54" opacity="0.4" filter="url(#neonGlow)" />

  <g fill="#FFFFFF" opacity="0.25">
    <rect x="60" y="80" width="60" height="14" rx="7" />
    <rect x="400" y="100" width="30" height="14" rx="7" />
    <rect x="80" y="420" width="50" height="14" rx="7" />
    <rect x="360" y="440" width="80" height="14" rx="7" />
  </g>

  <g filter="url(#softShadow)">
    
    <g transform="rotate(-15 256 256)">
      <rect x="116" y="126" width="280" height="260" rx="35" fill="#FFFFFF" opacity="0.15" />
      <rect x="116" y="126" width="280" height="260" rx="35" fill="none" stroke="#FFFFFF" stroke-width="8" opacity="0.4" />
    </g>

    <g transform="rotate(15 256 256)">
      <rect x="116" y="126" width="280" height="260" rx="35" fill="#FFFFFF" opacity="0.15" />
      <rect x="116" y="126" width="280" height="260" rx="35" fill="none" stroke="#FFFFFF" stroke-width="8" opacity="0.4" />
    </g>

    <g>
      <rect x="96" y="146" width="320" height="220" rx="40" fill="#FFFFFF" opacity="0.25" />

      <g clip-path="url(#photoClip)">
        
        <circle cx="310" cy="210" r="32" fill="#FFFFFF" opacity="0.6" filter="url(#neonGlow)" />
        <circle cx="310" cy="210" r="22" fill="#FFFFFF" />

        <circle cx="140" cy="380" r="130" fill="#FFFFFF" opacity="0.5" />
        <circle cx="380" cy="400" r="160" fill="#FFFFFF" opacity="0.7" />
        <circle cx="260" cy="440" r="160" fill="#FFFFFF" opacity="0.95" />
        
        <rect x="116" y="166" width="70" height="16" rx="8" fill="#FFFFFF" opacity="0.4" />
      </g>

      <rect x="96" y="146" width="320" height="220" rx="40" fill="none" stroke="#FFFFFF" stroke-width="14" />
    </g>
    
  </g>
</svg>