<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="rubyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF416C" /> <stop offset="100%" stop-color="#FF4B2B" /> </linearGradient>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="115" fill="url(#rubyGrad)" />
  
  <circle cx="120" cy="380" r="70" fill="#FFD700" opacity="0.35" filter="url(#neonGlow)" />
  <circle cx="400" cy="120" r="80" fill="#900020" opacity="0.4" filter="url(#neonGlow)" />

  <g fill="#FFFFFF" opacity="0.25">
    <rect x="60" y="100" width="80" height="16" rx="8" />
    <rect x="150" y="100" width="24" height="16" rx="8" />
    
    <rect x="360" y="400" width="90" height="16" rx="8" />
    <rect x="320" y="400" width="30" height="16" rx="8" />
    
    <rect x="40" y="250" width="40" height="12" rx="6" opacity="0.5" />
    <rect x="440" y="280" width="50" height="12" rx="6" opacity="0.5" />
  </g>

  <g filter="url(#softShadow)">
    
    <rect x="96" y="156" width="320" height="200" rx="40" fill="#FFFFFF" opacity="0.15" />
    
    <rect x="96" y="156" width="320" height="200" rx="40" fill="none" stroke="#FFFFFF" stroke-width="16" />

    <path d="M 110 180 L 225 255 Q 256 275 287 255 L 402 180" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="16" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <path d="M 110 340 L 205 270" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="16" 
          stroke-linecap="round" />
          
    <path d="M 402 340 L 307 270" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="16" 
          stroke-linecap="round" />

  </g>

  <g>
    <circle cx="416" cy="156" r="22" fill="#FFD700" filter="url(#neonGlow)" />
    <circle cx="416" cy="156" r="14" fill="#FFFFFF" />
  </g>

</svg>