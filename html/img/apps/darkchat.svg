<svg class="app-icon-darkchat" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="darkchatBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>

    <filter id="bubbleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.9" />
    </filter>

    <filter id="neonGreenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neonPurpleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="matrixPattern" width="64" height="64" patternUnits="userSpaceOnUse">
      <text x="8" y="16" fill="#22c55e" font-family="monospace" font-size="14" font-weight="bold" opacity="0.15">0</text>
      <text x="40" y="32" fill="#a855f7" font-family="monospace" font-size="14" font-weight="bold" opacity="0.15">1</text>
      <text x="16" y="48" fill="#22c55e" font-family="monospace" font-size="14" font-weight="bold" opacity="0.15">1</text>
      <text x="48" y="64" fill="#a855f7" font-family="monospace" font-size="14" font-weight="bold" opacity="0.15">0</text>
    </pattern>

    <clipPath id="appClip">
      <rect x="0" y="0" width="512" height="512" rx="115" />
    </clipPath>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#darkchatBg)" />
  
  <g clip-path="url(#appClip)">
    <rect class="cyber-matrix-bg" x="0" y="-512" width="512" height="1536" fill="url(#matrixPattern)" />
  </g>

  <g transform="translate(256, 256) scale(1.15) translate(-256, -256)">
    
    <g class="back-bubble" filter="url(#bubbleShadow)">
      <path d="M 370 130 H 230 A 30 30 0 0 0 200 160 V 270 A 30 30 0 0 0 230 300 H 330 L 390 350 L 370 300 A 30 30 0 0 0 400 270 V 160 A 30 30 0 0 0 370 130 Z" fill="#09090b" stroke="#a855f7" stroke-width="6" stroke-linejoin="round" />
      
      <g stroke="#a855f7" stroke-width="5" stroke-linecap="round" fill="none">
        <rect x="270" y="200" width="30" height="20" rx="4" />
        <path d="M 276 200 V 190 A 9 9 0 0 1 294 190 V 200" />
        <circle cx="285" cy="210" r="3" fill="#a855f7" stroke="none" />
      </g>
    </g>

    <g class="front-bubble" filter="url(#bubbleShadow)">
      <path d="M 140 190 H 280 A 30 30 0 0 1 310 220 V 330 A 30 30 0 0 1 280 360 H 180 L 120 410 L 140 360 A 30 30 0 0 1 110 330 V 220 A 30 30 0 0 1 140 190 Z" fill="#000000" stroke="#22c55e" stroke-width="8" stroke-linejoin="round" />
      
      <g class="typing-dots" fill="#22c55e">
        <circle class="dot-1" cx="170" cy="275" r="10" />
        <circle class="dot-2" cx="210" cy="275" r="10" />
        <circle class="dot-3" cx="250" cy="275" r="10" />
      </g>
    </g>

  </g>
</svg>